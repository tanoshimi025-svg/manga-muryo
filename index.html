<section class="content-box">
    <h2>いま無料で読める漫画たち</h2>
    <div class="iframe-wrapper">
        <div id="loading-msg" style="text-align: center; padding: 20px; color: #666;">
            読み込み中...
        </div>
        <div id="comic-table-container"></div>
    </div>
</section>

<script>
    const GAS_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrTQW7az9R4KvQqdq-LprHnHf8zMvaw3WHR3ihblcR4NBVVRtG3teiraA0Q_nPeqNv6I2ceu2SBUk8GjKuElVS_3EAPvh4fEezjIcoTeE6jaJKB4z8ojNPlZuuw3-r9Dmu2N9KkN_JEbItqyrBrYPKG21MuuGci2Cl2BHlvQo-RZpQGlaOnV2OHoCxco4RbXjlWWAM5a81ef4Tpd4AGp-lgndo1CcTS0UcWlSd_wV4BQBJtelM_CLGNaY1hBKgp8Rw77ZHYfgyaHjcWLGGqKa439UL9aIQ&lib=M8anMNgM29Sd-pgvE6-tpDTykRsKEY4r6";

    async function fetchComicData() {
        try {
            const response = await fetch(GAS_URL);
            const data = await response.json();
            
            if (data.length <= 1) return; // データがない場合は中断

            let html = '<table class="comic-list-table">';
            
            // ヘッダーの作成（C:タイトル, D:無料範囲, E:配信サイト）
            // A(0), B(1)は飛ばして、C(2), D(3), E(4)を表示
            html += `
                <thead>
                    <tr>
                        <th>タイトル</th>
                        <th>無料範囲</th>
                        <th>配信サイト</th>
                    </tr>
                </thead>
                <tbody>`;

            // 2行目以降のデータ処理
            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                const url = row[1];       // B列: URL
                const title = row[2];     // C列: タイトル
                const range = row[3];     // D列: 無料範囲
                const site = row[4];      // E列: 配信サイト

                // タイトルにURLのリンクを付与
                html += `
                    <tr>
                        <td><a href="${url}" target="_blank" rel="noopener">${title}</a></td>
                        <td>${range}</td>
                        <td>${site}</td>
                    </tr>`;
            }
            html += '</tbody></table>';

            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('comic-table-container').innerHTML = html;

        } catch (error) {
            console.error("エラー:", error);
            document.getElementById('loading-msg').innerText = "データの取得に失敗しました。";
        }
    }

    fetchComicData();
</script>

<style>
    /* テーブルのデザインを少し整えます */
    .comic-list-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }
    .comic-list-table th, .comic-list-table td {
        border-bottom: 1px solid #eee;
        padding: 12px 8px;
        text-align: left;
    }
    .comic-list-table th {
        background-color: #fcfcfc;
        color: #555;
        font-weight: bold;
    }
    .comic-list-table a {
        color: #007bff;
        text-decoration: none;
        font-weight: bold;
    }
    .comic-list-table a:hover {
        text-decoration: underline;
    }
    /* スマホで見やすくするための横スクロール設定 */
    .iframe-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
</style>

<style>
    /* 元のiframe-wrapperのスタイルを活かすための調整 */
    .iframe-wrapper {
        width: 100%;
        overflow-x: auto; /* スマホで表がはみ出た時に横スクロール可能にする */
        min-height: 200px;
    }
    /* テーブルのデザイン調整（お好みで） */
    #comic-table-container table {
        font-size: 14px;
        color: #333;
    }
</style>
